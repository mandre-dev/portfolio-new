name: Deploy Portfolio

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Job 1: Build & Test ────────────────────────────────────────
  build:
    name: Build & Type-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: next-build
          path: |
            .next/
            public/
            package.json
            package-lock.json
            next.config.ts
          retention-days: 1

  # ── Job 2: Deploy to VPS ──────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    environment: production

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: next-build
          path: ./dist

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            echo "🚀 Starting deploy..."

            APP_DIR="/var/www/portfolio"
            cd $APP_DIR

            # Pull latest code
            git pull origin main

            # Install deps (only prod)
            npm ci --omit=dev

            # Build
            npm run build

            # Reload PM2 (zero-downtime)
            pm2 reload portfolio --update-env

            echo "✅ Deploy concluído!"

      - name: Health check
        run: |
          sleep 5
          curl --fail https://${{ secrets.VPS_HOST }} || exit 1
          echo "✅ Health check passou!"
